# ===========================================================================
# mkdocs.yml — PM Skills Documentation Site
# ===========================================================================
site_name: PM Skills
site_url: https://product-on-purpose.github.io/pm-skills/
site_author: jprisant
site_description: >-
  32 AI agent skills for product managers. Open-source, spec-compliant
  skills for Claude Code, Cursor, Codex CLI, GitHub Copilot, and more.
repo_name: product-on-purpose/pm-skills
repo_url: https://github.com/product-on-purpose/pm-skills
edit_uri: edit/main/docs/
copyright: >-
  Copyright &copy; 2026 product-on-purpose

# ===========================================================================
# THEME
# ===========================================================================
theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/robot-happy
    repo: fontawesome/brands/github
  language: en
  features:
    # Navigation
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.prune
    # Table of contents
    - toc.follow
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Header
    - header.autohide
    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view

# ===========================================================================
# PLUGINS
# ===========================================================================
plugins:
  - search:
      separator: '[\s\-\.]+'
  - privacy:
      enabled: !ENV [CI, true]
  - social:
      enabled: !ENV [CI, false]
  - tags
  - redirects:
      redirect_maps:
        'bundles/index.md': 'workflows/index.md'
        'bundles/feature-kickoff.md': 'workflows/feature-kickoff.md'
        'bundles/lean-startup.md': 'workflows/lean-startup.md'
        'bundles/triple-diamond.md': 'workflows/triple-diamond.md'
  - git-revision-date-localized:
      enabled: !ENV [CI, false]
      type: timeago
      enable_creation_date: true
      fallback_to_build_date: true

# Exclude files from site build that have copies in the MkDocs tree
exclude_docs: |
  internal/
  workflows/README.md
  /agent-skill-anatomy.md
  /pm-skill-anatomy.md
  /pm-skill-lifecycle.md
  /getting-started.md
  guides/authoring-pm-skills.md
  frameworks/triple-diamond-delivery-process.md

# ===========================================================================
# MARKDOWN EXTENSIONS
# ===========================================================================
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  # PyMdown Extensions
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ===========================================================================
# EXTRA
# ===========================================================================
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/product-on-purpose/pm-skills

extra_css:
  - stylesheets/extra.css

