name: Validate Documentation

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'skills/**/SKILL.md'
      - 'skills/**/TEMPLATE.md'
      - 'skills/**/EXAMPLE.md'
      - '_bundles/**'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-validate-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-validate-

      - name: Install Python dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs (strict mode)
        run: mkdocs build --strict

      - name: Verify nav pages exist in build
        run: |
          # Catches pages listed in nav that are silently excluded or missing
          FAIL=0
          in_nav=0
          while IFS= read -r line; do
            if echo "$line" | grep -qE '^nav:'; then
              in_nav=1
              continue
            fi
            if [[ $in_nav -eq 1 ]] && echo "$line" | grep -qE '^[a-z]'; then
              in_nav=0
              continue
            fi
            [[ $in_nav -eq 0 ]] && continue
            md_path=$(echo "$line" | grep -oE '[a-zA-Z0-9_/-]+\.md' | head -1)
            [[ -z "$md_path" ]] && continue
            if [[ "$md_path" == "index.md" ]]; then
              html_path="site/index.html"
            elif [[ "$md_path" == */index.md ]]; then
              html_path="site/${md_path%.md}.html"
            else
              html_path="site/${md_path%.md}/index.html"
            fi
            if [[ ! -f "$html_path" ]]; then
              echo "✗ Nav: '$md_path' -> '$html_path' NOT FOUND"
              FAIL=1
            fi
          done < mkdocs.yml
          if [[ $FAIL -eq 1 ]]; then
            echo ""
            echo "FAILED: Nav pages missing from build output."
            echo "Check exclude_docs in mkdocs.yml — a pattern may be"
            echo "matching files in subdirectories unintentionally."
            exit 1
          fi
          echo "✓ All $(grep -oE '[a-zA-Z0-9_/-]+\.md' mkdocs.yml | wc -l | tr -d ' ') nav pages verified in build"
